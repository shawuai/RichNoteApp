<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Note Editor</title>

    <!-- 引入 Quill 的样式 (CDN) -->
    <!-- 注意：如果需要完全离线使用，请下载这两个文件到本地 Resources 文件夹并修改路径 -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* 防止出现双重滚动条 */
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: #fff;
        }

        #editor-container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 工具栏样式微调 */
        .ql-toolbar {
            border: none !important;
            border-bottom: 1px solid #e0e0e0 !important;
            background: #f9f9f9;
            padding: 12px !important;
            flex-shrink: 0; /* 防止工具栏被压缩 */
        }

        /* 编辑区域样式微调 */
        .ql-container.ql-snow {
            border: none !important;
            flex-grow: 1; /* 占据剩余空间 */
            overflow-y: auto; /* 内容过多时显示滚动条 */
            font-size: 16px;
            line-height: 1.6;
        }

        .ql-editor {
            padding: 20px 30px; /* 增加内边距，阅读更舒适 */
            outline: none;
        }

            /* 图片最大宽度限制，防止撑破布局 */
            .ql-editor img {
                max-width: 100%;
                height: auto;
                display: block;
                margin: 10px 0;
            }

            /* 列表样式修复 */
            .ql-editor ol, .ql-editor ul {
                padding-left: 1.5em;
            }

        /* 加载失败提示 */
        #load-error {
            display: none;
            color: red;
            text-align: center;
            padding: 20px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <!-- 加载错误提示 -->
    <div id="load-error">
        <h3>编辑器资源加载失败</h3>
        <p>请检查网络连接，或确认 Quill JS/CSS 文件是否存在。</p>
    </div>

    <!-- 编辑器容器 -->
    <div id="editor-container"></div>

    <!-- 引入 Quill 的核心 JS (CDN) -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <script>
        // 检查 Quill 是否加载成功
        if (typeof Quill === 'undefined') {
            document.getElementById('load-error').style.display = 'block';
            document.getElementById('editor-container').style.display = 'none';
        } else {
            // 初始化 Quill 编辑器
            var quill = new Quill('#editor-container', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, 4, false] }], // 标题
                        ['bold', 'italic', 'underline', 'strike'], // 格式
                        [{ 'list': 'ordered' }, { 'list': 'bullet' }], // 列表
                        [{ 'color': [] }, { 'background': [] }], // 颜色
                        ['image', 'link'], // 图片和链接
                        ['clean'] // 清除格式
                    ],
                    clipboard: {
                        matchVisual: true,
                        // 自定义粘贴匹配器，增强兼容性
                        matchers: [
                            [Node.ELEMENT_NODE, function (node, delta) {
                                // 这里可以添加特定的过滤逻辑，目前保持默认以保留最多格式
                                return delta;
                            }]
                        ]
                    }
                },
                placeholder: '在此输入内容，支持直接粘贴网页图文...',
                readOnly: false
            });

            // --- 核心功能：字数统计 ---

            // 暴露给 C# 调用的函数
            window.requestWordCount = function () {
                // 获取纯文本内容
                var text = quill.getText();
                // 去除空白字符 (空格、换行、制表符)
                var cleanText = text.replace(/\s/g, "");
                var count = cleanText.length;

                // 发送消息给 C#
                sendMessage({
                    type: 'wordCount',
                    count: count
                });
            };

            // --- 核心功能：内容同步 ---

            // 监听编辑器变化 (用户输入、粘贴等)
            quill.on('text-change', function (delta, oldDelta, source) {
                if (source === 'user') {
                    var html = quill.root.innerHTML;
                    sendMessage({
                        type: 'content_change',
                        html: html
                    });

                    // 内容变化时，也可以主动更新一次字数（可选，让字数跳动更实时）
                    // requestWordCount();
                }
            });

            // --- 通信辅助函数 ---

            function sendMessage(msgObj) {
                if (window.chrome && window.chrome.webview) {
                    window.chrome.webview.postMessage(JSON.stringify(msgObj));
                } else {
                    console.log("WebView2 Message:", msgObj);
                }
            }

            // --- 初始化与外部调用 ---

            // 通知 C# 编辑器已就绪
            setTimeout(function () {
                sendMessage({ type: 'ready' });
            }, 300);

            // 暴露给 C# 调用的全局函数：设置内容
            window.setEditorContent = function (html) {
                if (html === null || html === undefined) {
                    quill.setText('');
                } else {
                    // 使用 root.innerHTML 直接设置，保留完整 HTML 结构
                    quill.root.innerHTML = html;
                }
            };

            // 暴露给 C# 调用的全局函数：获取内容 (通常由 text-change 自动推送，此函数备用)
            window.getEditorContent = function () {
                return quill.root.innerHTML;
            };

            // 监听来自 C# 的消息 (例如：切换笔记时主动加载)
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.addEventListener('message', function (event) {
                    try {
                        var data = JSON.parse(event.data);
                        if (data.type === 'load') {
                            setEditorContent(data.html);
                        }
                    } catch (e) {
                        console.error("Message parse error", e);
                    }
                });
            }

            console.log("Quill Editor initialized successfully.");
        }
    </script>
</body>
</html>
